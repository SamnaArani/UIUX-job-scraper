name: Job Search Bot 🤖

on:
  schedule:
    - cron: "30 3 * * *"   # هر روز ساعت ۷ صبح ایران
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false  # در صورت خطا در یک بخش، بخش‌های دیگر به کار خود ادامه می‌دهند
      matrix:
        category: [design, dev, seo]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore seen_jobs cache
        uses: actions/cache@v4
        with:
          # تصحیح مسیر فایل متناسب با ساختار خروجی پایتون برای ماتریکس‌های مختلف
          path: seen_jobs_${{ matrix.category }}.txt
          key: seen-jobs-${{ matrix.category }}-${{ github.run_id }}
          restore-keys: |
            seen-jobs-${{ matrix.category }}-

      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_DESIGN: ${{ secrets.TOPIC_DESIGN }}
          TOPIC_DEV: ${{ secrets.TOPIC_DEV }}
          TOPIC_SEO: ${{ secrets.TOPIC_SEO }}
          JOB_TOPIC_ID: ${{ secrets.JOB_TOPIC_ID }}
          RAPIDAPI_KEY: ${{ matrix.category == 'design' && secrets.RAPIDAPI_KEY_DESIGN || matrix.category == 'dev' && secrets.RAPIDAPI_KEY_DEVELOP || matrix.category == 'seo' && secrets.RAPIDAPI_KEY_SEO || secrets.RAPIDAPI_KEY }}
          GSHEET_CREDENTIALS: ${{ secrets.GSHEET_CREDENTIALS }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          TELEGRAPH_TOKEN: ${{ secrets.TELEGRAPH_TOKEN }}
          USER_SKILLS: ${{ secrets.USER_SKILLS }}
          USER_RESUME: ${{ secrets.USER_RESUME }}
        run: python bot.py ${{ matrix.category }}
